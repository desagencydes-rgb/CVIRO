<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Error ' + ${errorCode} + ' | CVPro'">Error | CVPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="error-body">
    <div class="error-container">
        <div class="error-code" th:text="${errorCode} ?: '500'">404</div>
        <h1 class="error-title" th:text="${errorMessage} ?: 'Something went wrong'">Page Not Found</h1>
        <p class="error-detail" th:text="${errorDetail} ?: 'An unexpected error occurred.'"></p>
        <div class="error-actions">
            <a th:href="@{/home}" class="btn btn-primary">Go Home</a>
            <a th:href="@{/dashboard}" class="btn btn-ghost">My Resumes</a>
        </div>
    </div>
</body>

</html>
